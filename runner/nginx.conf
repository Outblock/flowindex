server {
    listen ${LISTEN_PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Dynamic DNS resolution for upstream services
    resolver ${DNS_RESOLVER} valid=10s ipv6=off;

    location /lsp {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # GitHub integration API — proxied to Node HTTP server
    location /github/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # GoTrue Auth Proxy — strips /auth/ prefix
    location /auth/ {
        set $gotrue_upstream "${GOTRUE_URL}";
        rewrite ^/auth/?(.*)$ /$1 break;
        proxy_pass $gotrue_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Simulate API — proxied to standalone simulator-api service
    location = /api/flow/v1/simulate {
        set $simulator_api "${SIMULATOR_API}";
        rewrite ^/api/flow/v1/simulate$ /api/simulate break;
        proxy_pass $simulator_api;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # Backend API Proxy — forwards /api/* to backend (cadence check, etc.)
    location /api/ {
        set $backend_api "${BACKEND_API}";
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass $backend_api;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Supabase Edge Functions Proxy — forwards to gateway
    location /functions/ {
        set $supabase_gateway "${SUPABASE_GATEWAY_URL}";
        proxy_pass $supabase_gateway;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
