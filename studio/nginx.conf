server {
    listen 8000;
    absolute_redirect off;

    # Common proxy headers
    set $proxy_host_header $host;
    set $proxy_real_ip $remote_addr;
    set $proxy_forwarded_for $proxy_add_x_forwarded_for;
    set $proxy_forwarded_proto $scheme;
    set $request_target "$request_method:$uri";

    # Login page (no auth required)
    location = /studio-login {
        default_type text/html;
        alias /etc/nginx/login.html;
    }

    # Login submit — validate token and set session cookie
    location = /studio-login-submit {
        default_type text/html;

        if ($arg_token = "${STUDIO_SESSION_TOKEN}") {
            add_header Set-Cookie "studio_session=${STUDIO_SESSION_TOKEN}; Path=/; HttpOnly; SameSite=Lax; Max-Age=604800" always;
            return 302 /;
        }
        return 302 /studio-login?error=1;
    }

    # All other requests require valid session cookie
    location / {
        # Check session cookie
        if ($cookie_studio_session != "${STUDIO_SESSION_TOKEN}") {
            return 302 /studio-login;
        }

        # Work around Studio auth-admin mutation bug (users create/update/delete)
        # by routing only mutation methods directly to GoTrue admin endpoints.
        if ($request_target ~ ^POST:/api/platform/auth/default/users$) {
            return 419;
        }
        if ($request_target ~ ^(PUT|DELETE):/api/platform/auth/default/users/[0-9a-fA-F-]+$) {
            return 419;
        }

        error_page 419 = @auth_users_mutation;

        proxy_pass ${STUDIO_UPSTREAM};
        proxy_set_header Host $proxy_host_header;
        proxy_set_header X-Real-IP $proxy_real_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location @auth_users_mutation {
        rewrite ^/api/platform/auth/default/users(.*)$ /admin/users$1 break;
        proxy_pass http://127.0.0.1:9999;
        proxy_set_header Authorization "Bearer ${SUPABASE_SERVICE_KEY}";
        proxy_set_header apikey "${SUPABASE_SERVICE_KEY}";
        proxy_set_header Host $proxy_host_header;
        proxy_set_header X-Real-IP $proxy_real_ip;
        proxy_set_header X-Forwarded-For $proxy_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }
}
