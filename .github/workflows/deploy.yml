name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      all:
        description: "Deploy ALL services"
        type: boolean
        default: false
      backend:
        description: "Backend"
        type: boolean
        default: false
      frontend:
        description: "Frontend"
        type: boolean
        default: false
      runner:
        description: "Runner"
        type: boolean
        default: false
      supabase:
        description: "Supabase"
        type: boolean
        default: false
      docs:
        description: "Docs"
        type: boolean
        default: false
      ai-chat:
        description: "AI Chat"
        type: boolean
        default: false
      studio:
        description: "Studio"
        type: boolean
        default: false
      sim-studio:
        description: "Sim Studio"
        type: boolean
        default: false

env:
  PROJECT_ID: flowindex-mainnet
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev/flowindex-mainnet/flowindex

jobs:
  # Detect which services changed (or use manual input)
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.result.outputs.backend }}
      frontend: ${{ steps.result.outputs.frontend }}
      runner: ${{ steps.result.outputs.runner }}
      supabase: ${{ steps.result.outputs.supabase }}
      docs: ${{ steps.result.outputs.docs }}
      ai-chat: ${{ steps.result.outputs.ai-chat }}
      studio: ${{ steps.result.outputs.studio }}
      sim-studio: ${{ steps.result.outputs.sim-studio }}
      sim-studio-images: ${{ steps.result.outputs.sim-studio-images }}
      sim-studio-seed: ${{ steps.result.outputs.sim-studio-seed }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'openapi-v1.json'
              - 'openapi-v2.json'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/deploy.yml'
            runner:
              - 'runner/**'
              - '.github/workflows/deploy.yml'
            docs:
              - 'devportal/**'
              - 'docs/**'
            ai-chat:
              - 'ai/chat/**'
              - '.github/workflows/deploy.yml'
            supabase:
              - 'supabase/**'
              - '.github/workflows/deploy.yml'
            studio:
              - 'studio/Dockerfile'
              - 'studio/entrypoint.sh'
              - 'studio/login.html'
              - 'studio/nginx.conf'
            sim-studio:
              - 'studio/seed/simstudio_seed.sql'
              - 'sim-workflow/**'
            sim-studio-images:
              - 'sim-workflow/**'
            sim-studio-seed:
              - 'studio/seed/simstudio_seed.sql'
      - name: Resolve outputs
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ALL="${{ inputs.all }}"
            echo "backend=${{ inputs.all == true || inputs.backend == true }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ inputs.all == true || inputs.frontend == true }}" >> $GITHUB_OUTPUT
            echo "runner=${{ inputs.all == true || inputs.runner == true }}" >> $GITHUB_OUTPUT
            echo "supabase=${{ inputs.all == true || inputs.supabase == true }}" >> $GITHUB_OUTPUT
            echo "docs=${{ inputs.all == true || inputs.docs == true }}" >> $GITHUB_OUTPUT
            echo "ai-chat=${{ inputs.all == true || inputs.ai-chat == true }}" >> $GITHUB_OUTPUT
            echo "studio=${{ inputs.all == true || inputs.studio == true }}" >> $GITHUB_OUTPUT
            SIM=${{ inputs.all == true || inputs.sim-studio == true }}
            echo "sim-studio=${SIM}" >> $GITHUB_OUTPUT
            echo "sim-studio-images=${SIM}" >> $GITHUB_OUTPUT
            echo "sim-studio-seed=${SIM}" >> $GITHUB_OUTPUT
          else
            echo "backend=${{ steps.filter.outputs.backend }}" >> $GITHUB_OUTPUT
            echo "frontend=${{ steps.filter.outputs.frontend }}" >> $GITHUB_OUTPUT
            echo "runner=${{ steps.filter.outputs.runner }}" >> $GITHUB_OUTPUT
            echo "supabase=${{ steps.filter.outputs.supabase }}" >> $GITHUB_OUTPUT
            echo "docs=${{ steps.filter.outputs.docs }}" >> $GITHUB_OUTPUT
            echo "ai-chat=${{ steps.filter.outputs.ai-chat }}" >> $GITHUB_OUTPUT
            echo "studio=${{ steps.filter.outputs.studio }}" >> $GITHUB_OUTPUT
            echo "sim-studio=${{ steps.filter.outputs.sim-studio }}" >> $GITHUB_OUTPUT
            echo "sim-studio-images=${{ steps.filter.outputs.sim-studio-images }}" >> $GITHUB_OUTPUT
            echo "sim-studio-seed=${{ steps.filter.outputs.sim-studio-seed }}" >> $GITHUB_OUTPUT
          fi

  build-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    concurrency:
      group: deploy-backend-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          provenance: false
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/backend:latest
            ${{ env.REGISTRY }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Deploy backend (zero-downtime)
        run: |
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            IMAGE=${{ env.REGISTRY }}/backend:${{ github.sha }}
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true
            docker image prune -af --filter "until=1h" 2>/dev/null || true
            docker pull $IMAGE
            docker stop backend 2>/dev/null; docker rm backend 2>/dev/null
            docker run --rm --network=host \
              --env-file /mnt/stateful_partition/pgdata/backend.env \
              $IMAGE ./indexer migrate --terminate-conns
            docker run -d --restart=always --name backend \
              --network=host \
              --env-file /mnt/stateful_partition/pgdata/backend.env \
              -e SKIP_MIGRATION=true \
              $IMAGE
          '

  build-frontend:
    needs: [changes, build-backend]
    if: |
      always() &&
      needs.changes.outputs.frontend == 'true' &&
      (needs.build-backend.result == 'success' || needs.build-backend.result == 'skipped')
    concurrency:
      group: deploy-frontend-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          provenance: false
          build-args: |
            VITE_API_URL=/api
            VITE_GOTRUE_URL=/auth
            VITE_SIM_STUDIO_URL=https://studio.flowindex.io
            VITE_GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.REGISTRY }}/frontend:latest
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Deploy frontend (pull & restart on GCE)
        run: |
          gcloud compute ssh flowindex-frontend --zone=us-central1-a --command='
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true; \
            docker image prune -af --filter "until=1h" 2>/dev/null || true; \
            docker pull ${{ env.REGISTRY }}/frontend:${{ github.sha }} && \
            docker stop frontend 2>/dev/null; docker rm frontend 2>/dev/null; \
            docker run -d --restart=always --name frontend \
              --network=host \
              -e BACKEND_API=http://10.128.0.4:8080 \
              -e BACKEND_WS=http://10.128.0.4:8080 \
              -e GOTRUE_URL=http://10.128.0.4:9999 \
              -e STUDIO_AUTH_URL=http://10.128.0.4:8000 \
              -e VITE_API_URL=https://flowindex.io/api \
              ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          '

      - name: Update Caddy config for TLS
        run: |
          gcloud compute ssh flowindex-frontend --zone=us-central1-a --command="
            sudo tee /tmp/Caddyfile > /dev/null <<'CADDYEOF'
          $(cat frontend/Caddyfile)
          CADDYEOF
            docker cp /tmp/Caddyfile caddy:/etc/caddy/Caddyfile
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          "

  build-runner:
    needs: changes
    if: needs.changes.outputs.runner == 'true'
    concurrency:
      group: deploy-runner-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate Supabase anon key
        id: supabase-keys
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: |
          ANON_KEY=$(python3 -c "
          import json,hmac,hashlib,base64,os
          def b(d): return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
          s=os.environ['SUPABASE_JWT_SECRET']
          h=b(json.dumps({'alg':'HS256','typ':'JWT'}).encode())
          p=b(json.dumps({'role':'anon','iss':'supabase','iat':1672531200,'exp':1988150400}).encode())
          print(h+'.'+p+'.'+b(hmac.new(s.encode(),(h+'.'+p).encode(),hashlib.sha256).digest()))
          ")
          echo "::add-mask::$ANON_KEY"
          echo "anon_key=$ANON_KEY" >> "$GITHUB_OUTPUT"

      - name: Build & push runner
        uses: docker/build-push-action@v6
        with:
          context: runner
          file: runner/Dockerfile
          push: true
          provenance: false
          build-args: |
            VITE_AI_CHAT_URL=https://ai.flowindex.io
            VITE_SUPABASE_URL=https://run.flowindex.io
            VITE_SUPABASE_ANON_KEY=${{ steps.supabase-keys.outputs.anon_key }}
            VITE_GOTRUE_URL=/auth
          tags: |
            ${{ env.REGISTRY }}/runner:latest
            ${{ env.REGISTRY }}/runner:${{ github.sha }}
          cache-from: type=gha,scope=runner
          cache-to: type=gha,scope=runner,mode=max

      - name: Deploy runner (pull & restart on GCE)
        run: |
          gcloud compute ssh flowindex-frontend --zone=us-central1-a --command='
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true; \
            docker image prune -af --filter "until=1h" 2>/dev/null || true; \
            docker pull ${{ env.REGISTRY }}/runner:${{ github.sha }} && \
            docker stop runner 2>/dev/null; docker rm runner 2>/dev/null; \
            docker run -d --restart=always --name runner \
              --network=host \
              -e PORT=8081 \
              -e GOTRUE_URL=http://10.128.0.4:9999 \
              -e SUPABASE_GATEWAY_URL=http://10.128.0.4:54321 \
              ${{ env.REGISTRY }}/runner:${{ github.sha }}
          '

      - name: Update Caddy config for TLS
        run: |
          gcloud compute ssh flowindex-frontend --zone=us-central1-a --command="
            sudo tee /tmp/Caddyfile > /dev/null <<'CADDYEOF'
          $(cat frontend/Caddyfile)
          CADDYEOF
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          "

  build-supabase:
    needs: changes
    if: needs.changes.outputs.supabase == 'true'
    concurrency:
      group: deploy-supabase-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build & push edge function images
        run: |
          for FUNC in passkey-auth flow-keys runner-projects; do
            docker build -f supabase/functions/Dockerfile \
              --build-arg FUNCTION_NAME=$FUNC \
              -t ${{ env.REGISTRY }}/edge-$FUNC:latest \
              -t ${{ env.REGISTRY }}/edge-$FUNC:${{ github.sha }} \
              supabase/functions
            docker push ${{ env.REGISTRY }}/edge-$FUNC --all-tags
          done

      - name: Build & push gateway image
        run: |
          docker build -f supabase/gateway/Dockerfile \
            -t ${{ env.REGISTRY }}/supabase-gateway:latest \
            -t ${{ env.REGISTRY }}/supabase-gateway:${{ github.sha }} \
            supabase/gateway
          docker push ${{ env.REGISTRY }}/supabase-gateway --all-tags

      - name: Generate Supabase JWT keys
        id: jwt-keys
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
        run: |
          python3 -c "
          import json,hmac,hashlib,base64,os
          def b(d): return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
          s=os.environ['SUPABASE_JWT_SECRET']
          h=b(json.dumps({'alg':'HS256','typ':'JWT'}).encode())
          for role in ['anon','service_role']:
            p=b(json.dumps({'role':role,'iss':'supabase','iat':1672531200,'exp':1988150400}).encode())
            sig=b(hmac.new(s.encode(),(h+'.'+p).encode(),hashlib.sha256).digest())
            name='anon_key' if role=='anon' else 'service_key'
            token=h+'.'+p+'.'+sig
            print(f'::add-mask::{token}')
            print(f'{name}={token}',file=open(os.environ['GITHUB_OUTPUT'],'a'))
          "

      - name: Run Supabase migrations
        run: |
          gcloud compute scp --recurse supabase/migrations supabase/run-migrations.sh flowindex-backend:~/supabase/ --zone=us-central1-a
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            set -e
            load_env() {
              while IFS= read -r line || [ -n "$line" ]; do
                [[ "$line" =~ ^[[:space:]]*# ]] && continue
                [[ -z "$line" ]] && continue
                export "$line" 2>/dev/null || true
              done < "$1"
            }
            load_env /mnt/stateful_partition/pgdata/backend.env
            bash ~/supabase/run-migrations.sh ~/supabase/migrations
            rm -rf ~/supabase
          '

      - name: Deploy edge functions, gateway & auth on GCE
        env:
          SUPABASE_ANON_KEY: ${{ steps.jwt-keys.outputs.anon_key }}
          SUPABASE_SERVICE_KEY: ${{ steps.jwt-keys.outputs.service_key }}
        run: |
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            set -e
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true

            # Load env for ENCRYPTION_KEY, LILICO_API_KEY, SUPABASE_DB_URL, SUPABASE_JWT_SECRET
            load_env() {
              while IFS= read -r line || [ -n "$line" ]; do
                [[ "$line" =~ ^[[:space:]]*# ]] && continue
                [[ -z "$line" ]] && continue
                export "$line" 2>/dev/null || true
              done < "$1"
            }
            load_env /mnt/stateful_partition/pgdata/backend.env

            REGISTRY="${{ env.REGISTRY }}"
            SHA="${{ github.sha }}"
            ANON_KEY="${{ steps.jwt-keys.outputs.anon_key }}"
            SERVICE_KEY="${{ steps.jwt-keys.outputs.service_key }}"

            # Pull all edge function images
            for IMG in edge-passkey-auth edge-flow-keys edge-runner-projects supabase-gateway; do
              docker pull "$REGISTRY/$IMG:$SHA"
            done
            # Pull GoTrue auth image
            docker pull supabase/gotrue:v2.170.0

            # Stop existing containers
            for C in edge-passkey-auth edge-flow-keys edge-runner-projects supabase-gateway supabase-auth; do
              docker stop "$C" 2>/dev/null || true
              docker rm "$C" 2>/dev/null || true
            done

            # GoTrue auth (port 9999)
            # Append search_path — use & if URL already has query params, else ?
            if [[ "$SUPABASE_DB_URL" == *"?"* ]]; then
              GOTRUE_DB_URL="${SUPABASE_DB_URL}&search_path=auth"
            else
              GOTRUE_DB_URL="${SUPABASE_DB_URL}?search_path=auth"
            fi
            docker run -d --restart=always --name supabase-auth \
              --network=host \
              -e GOTRUE_API_HOST=0.0.0.0 \
              -e GOTRUE_API_PORT=9999 \
              -e API_EXTERNAL_URL=https://flowindex.io/auth \
              -e GOTRUE_DB_DRIVER=postgres \
              -e GOTRUE_DB_DATABASE_URL="$GOTRUE_DB_URL" \
              -e GOTRUE_SITE_URL=https://flowindex.io \
              -e GOTRUE_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
              -e GOTRUE_JWT_EXP=3600 \
              -e GOTRUE_DISABLE_SIGNUP=false \
              -e GOTRUE_EXTERNAL_EMAIL_ENABLED=true \
              -e GOTRUE_MAILER_AUTOCONFIRM=true \
              -e GOTRUE_MAILER_URLPATHS_CONFIRMATION=/developer/callback \
              -e GOTRUE_EXTERNAL_GITHUB_ENABLED=true \
              -e GOTRUE_EXTERNAL_GITHUB_CLIENT_ID="${{ secrets.OAUTH_GITHUB_CLIENT_ID }}" \
              -e GOTRUE_EXTERNAL_GITHUB_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}" \
              -e GOTRUE_EXTERNAL_GITHUB_REDIRECT_URI=https://flowindex.io/auth/callback \
              -e GOTRUE_EXTERNAL_GOOGLE_ENABLED=true \
              -e GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID="${{ secrets.OAUTH_GOOGLE_CLIENT_ID }}" \
              -e GOTRUE_EXTERNAL_GOOGLE_SECRET="${{ secrets.OAUTH_GOOGLE_CLIENT_SECRET }}" \
              -e GOTRUE_EXTERNAL_GOOGLE_REDIRECT_URI=https://flowindex.io/auth/callback \
              supabase/gotrue:v2.170.0

            # Edge function: passkey-auth (port 8101)
            docker run -d --restart=always --name edge-passkey-auth \
              --network=host \
              -e PORT=8101 \
              -e SUPABASE_URL=http://127.0.0.1:54321 \
              -e SUPABASE_ANON_KEY="$ANON_KEY" \
              -e SUPABASE_SERVICE_ROLE_KEY="$SERVICE_KEY" \
              -e SUPABASE_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
              "$REGISTRY/edge-passkey-auth:$SHA"

            # Edge function: flow-keys (port 8102)
            docker run -d --restart=always --name edge-flow-keys \
              --network=host \
              -e PORT=8102 \
              -e SUPABASE_URL=http://127.0.0.1:54321 \
              -e SUPABASE_ANON_KEY="$ANON_KEY" \
              -e SUPABASE_SERVICE_ROLE_KEY="$SERVICE_KEY" \
              -e ENCRYPTION_KEY="${ENCRYPTION_KEY}" \
              -e LILICO_API_KEY="${LILICO_API_KEY:-}" \
              "$REGISTRY/edge-flow-keys:$SHA"

            # Edge function: runner-projects (port 8103)
            docker run -d --restart=always --name edge-runner-projects \
              --network=host \
              -e PORT=8103 \
              -e SUPABASE_URL=http://127.0.0.1:54321 \
              -e SUPABASE_ANON_KEY="$ANON_KEY" \
              -e SUPABASE_SERVICE_ROLE_KEY="$SERVICE_KEY" \
              "$REGISTRY/edge-runner-projects:$SHA"

            # Gateway (port 54321) — routes to edge functions, auth, and REST
            docker run -d --restart=always --name supabase-gateway \
              --network=host \
              -e GATEWAY_PORT=54321 \
              -e PASSKEY_AUTH_PORT=8101 \
              -e FLOW_KEYS_PORT=8102 \
              -e RUNNER_PROJECTS_PORT=8103 \
              -e GOTRUE_PORT=9999 \
              -e POSTGREST_PORT=3000 \
              "$REGISTRY/supabase-gateway:$SHA"

            echo "Supabase edge functions, gateway & auth deployed"
            docker ps --filter name=edge- --filter name=supabase- --format "table {{.Names}}\t{{.Status}}"
          '

  build-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    concurrency:
      group: deploy-docs-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push docs
        uses: docker/build-push-action@v6
        with:
          context: .
          file: devportal/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/docs:latest
            ${{ env.REGISTRY }}/docs:${{ github.sha }}
          cache-from: type=gha,scope=docs
          cache-to: type=gha,scope=docs,mode=max

      - name: Deploy docs to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: flowindex-docs
          region: us-central1
          image: ${{ env.REGISTRY }}/docs:${{ github.sha }}

  build-ai-chat:
    needs: changes
    if: needs.changes.outputs.ai-chat == 'true'
    concurrency:
      group: deploy-ai-chat-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ai-chat
        uses: docker/build-push-action@v6
        with:
          context: ai/chat
          file: ai/chat/Dockerfile
          push: true
          provenance: false
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.AI_CHAT_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.AI_CHAT_SUPABASE_ANON_KEY }}
          tags: |
            ${{ env.REGISTRY }}/ai-chat:latest
            ${{ env.REGISTRY }}/ai-chat:${{ github.sha }}
          cache-from: type=gha,scope=ai-chat
          cache-to: type=gha,scope=ai-chat,mode=max

      - name: Deploy ai-chat (pull & restart on GCE)
        run: |
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true; \
            docker image prune -af --filter "until=1h" 2>/dev/null || true; \
            docker pull ${{ env.REGISTRY }}/ai-chat:${{ github.sha }} && \
            docker stop ai-chat 2>/dev/null; docker rm ai-chat 2>/dev/null; \
            docker run -d --restart=always --name ai-chat \
              --network=host \
              --env-file /mnt/stateful_partition/pgdata/ai-chat.env \
              ${{ env.REGISTRY }}/ai-chat:${{ github.sha }}
          '

  build-studio:
    needs: changes
    if: needs.changes.outputs.studio == 'true'
    concurrency:
      group: deploy-studio-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push studio
        uses: docker/build-push-action@v6
        with:
          context: studio
          file: studio/Dockerfile
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/studio:latest
            ${{ env.REGISTRY }}/studio:${{ github.sha }}
          cache-from: type=gha,scope=studio-auth-proxy
          cache-to: type=gha,scope=studio-auth-proxy,mode=max

      - name: Create deploy script
        run: |
          cat > /tmp/gen_jwt.py << 'PYSCRIPT'
          import json, hmac, hashlib, base64, os
          def b64url(d):
              return base64.urlsafe_b64encode(d).rstrip(b'=').decode()
          s = os.environ['SUPABASE_JWT_SECRET']
          h = b64url(json.dumps({'alg': 'HS256', 'typ': 'JWT'}).encode())
          for role in ['anon', 'service_role']:
              p = b64url(json.dumps({'role': role, 'iss': 'supabase', 'iat': 1672531200, 'exp': 1988150400}).encode())
              sig = hmac.new(s.encode(), (h + '.' + p).encode(), hashlib.sha256).digest()
              name = 'SUPABASE_ANON_KEY' if role == 'anon' else 'SUPABASE_SERVICE_KEY'
              print(f'export {name}={h}.{p}.{b64url(sig)}')
          PYSCRIPT
          cat > /tmp/deploy-studio.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          REGISTRY_IMAGE="$1"

          # Load env files safely (handles values with backticks/special chars)
          load_env() {
            while IFS= read -r line || [ -n "$line" ]; do
              # Skip comments and blank lines
              [[ "$line" =~ ^[[:space:]]*# ]] && continue
              [[ -z "$line" ]] && continue
              # Export the variable
              export "$line" 2>/dev/null || true
            done < "$1"
          }

          load_env /mnt/stateful_partition/pgdata/backend.env

          # Auto-create studio.env with defaults if it does not exist
          STUDIO_ENV=/mnt/stateful_partition/pgdata/studio.env
          if [ ! -f "$STUDIO_ENV" ]; then
            GENERATED_PW=$(head -c 16 /dev/urandom | base64 | tr -d "/+=" | head -c 20)
            printf "STUDIO_USER=admin\nSTUDIO_PASSWORD=%s\n" "$GENERATED_PW" > "$STUDIO_ENV"
            echo "Created $STUDIO_ENV with generated password: $GENERATED_PW"
          fi
          load_env "$STUDIO_ENV"

          # Parse DB credentials from SUPABASE_DB_URL (postgres://user:pass@host:port/dbname)
          DB_USER=$(echo "$SUPABASE_DB_URL" | sed -n 's|postgres://\([^:]*\):.*|\1|p')
          DB_PASS=$(echo "$SUPABASE_DB_URL" | sed -n 's|postgres://[^:]*:\([^@]*\)@.*|\1|p')
          DB_HOST=$(echo "$SUPABASE_DB_URL" | sed -n 's|.*@\([^:/]*\)[:/].*|\1|p')
          DB_PORT=$(echo "$SUPABASE_DB_URL" | sed -n 's|.*:\([0-9]*\)/.*|\1|p')
          DB_NAME=$(echo "$SUPABASE_DB_URL" | sed -n 's|.*/\([^?]*\).*|\1|p')

          echo "DB: $DB_USER@$DB_HOST:$DB_PORT/$DB_NAME"

          # Generate Supabase JWT keys from SUPABASE_JWT_SECRET
          if [ -z "${SUPABASE_ANON_KEY:-}" ] || [ "${SUPABASE_ANON_KEY:-}" = "anon" ]; then
            python3 /tmp/gen_jwt.py > /tmp/jwt_exports.sh
            source /tmp/jwt_exports.sh
            echo "Generated JWT keys from SUPABASE_JWT_SECRET"
          fi

          # 1) pg-meta (port 8086)
          docker stop supabase-meta 2>/dev/null || true; docker rm supabase-meta 2>/dev/null || true
          docker run -d --restart=always --name supabase-meta \
            --network=host \
            -e PG_META_PORT=8086 \
            -e PG_META_DB_HOST="$DB_HOST" \
            -e PG_META_DB_PORT="$DB_PORT" \
            -e PG_META_DB_NAME="$DB_NAME" \
            -e PG_META_DB_USER="$DB_USER" \
            -e PG_META_DB_PASSWORD="$DB_PASS" \
            supabase/postgres-meta:v0.96.0

          # 2) PostgREST (port 3000) — required for Studio Table Editor
          docker stop supabase-rest 2>/dev/null || true; docker rm supabase-rest 2>/dev/null || true
          docker run -d --restart=always --name supabase-rest \
            --network=host \
            -e PGRST_DB_URI="postgres://$DB_USER:$DB_PASS@$DB_HOST:$DB_PORT/$DB_NAME" \
            -e PGRST_DB_SCHEMAS="public,raw,app" \
            -e PGRST_DB_ANON_ROLE="$DB_USER" \
            -e PGRST_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
            -e PGRST_SERVER_PORT=3000 \
            postgrest/postgrest:v12.2.8

          # 3) Studio (port 3100)
          docker stop supabase-studio 2>/dev/null || true; docker rm supabase-studio 2>/dev/null || true
          docker run -d --restart=always --name supabase-studio \
            --network=host \
            -e PORT=3100 \
            -e HOSTNAME=0.0.0.0 \
            -e STUDIO_PG_META_URL=http://127.0.0.1:8086 \
            -e SUPABASE_URL=http://127.0.0.1:3000 \
            -e SUPABASE_REST_URL=http://127.0.0.1:3000 \
            -e SUPABASE_ANON_KEY="${SUPABASE_ANON_KEY:-anon}" \
            -e SUPABASE_SERVICE_KEY="${SUPABASE_SERVICE_KEY:-service}" \
            -e AUTH_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
            -e POSTGRES_HOST="$DB_HOST" \
            -e POSTGRES_PORT="$DB_PORT" \
            -e POSTGRES_DB="$DB_NAME" \
            -e POSTGRES_PASSWORD="$DB_PASS" \
            -e DEFAULT_ORGANIZATION_NAME=FlowIndex \
            -e DEFAULT_PROJECT_NAME=FlowIndex \
            -e NEXT_PUBLIC_ENABLE_LOGS=true \
            -e NEXT_ANALYTICS_BACKEND_PROVIDER=postgres \
            supabase/studio:2025.05.05-sha-3c3fe9b

          # 4) studio-auth (port 8000)
          docker stop studio-auth 2>/dev/null || true; docker rm studio-auth 2>/dev/null || true
          docker run -d --restart=always --name studio-auth \
            --network=host \
            -e STUDIO_USER="${STUDIO_USER:-admin}" \
            -e STUDIO_PASSWORD="${STUDIO_PASSWORD:-changeme}" \
            -e STUDIO_UPSTREAM=http://127.0.0.1:3100 \
            -e SUPABASE_SERVICE_KEY="${SUPABASE_SERVICE_KEY}" \
            "$REGISTRY_IMAGE"

          echo "Studio stack deployed successfully"
          docker ps --filter name=supabase --filter name=studio --filter name=postgrest --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          SCRIPT

      - name: Deploy studio stack (pg-meta + studio + studio-auth on GCE)
        run: |
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            docker-credential-gcr configure-docker --registries=us-central1-docker.pkg.dev 2>/dev/null || true
            echo "=== Disk usage before prune ==="
            df -h / /var/lib/docker 2>/dev/null || df -h /
            docker system prune -af 2>/dev/null || true
            echo "=== Disk usage after prune ==="
            df -h / /var/lib/docker 2>/dev/null || df -h /
            docker pull ${{ env.REGISTRY }}/studio:${{ github.sha }}
            docker pull supabase/postgres-meta:v0.96.0
            docker pull postgrest/postgrest:v12.2.8
            docker pull supabase/studio:2025.05.05-sha-3c3fe9b
          '
          gcloud compute scp /tmp/gen_jwt.py flowindex-backend:/tmp/gen_jwt.py --zone=us-central1-a
          gcloud compute scp /tmp/deploy-studio.sh flowindex-backend:/tmp/deploy-studio.sh --zone=us-central1-a
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            bash /tmp/deploy-studio.sh ${{ env.REGISTRY }}/studio:${{ github.sha }}
          '

  build-sim-workflow-images:
    needs: changes
    if: needs.changes.outputs.sim-studio-images == 'true'
    concurrency:
      group: build-sim-workflow-images-${{ github.ref }}-${{ matrix.name }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: app
            dockerfile: docker/app.Dockerfile
            image: simstudio-fork
          - name: realtime
            dockerfile: docker/realtime.Dockerfile
            image: simstudio-fork-realtime
          - name: migrations
            dockerfile: docker/db.Dockerfile
            image: simstudio-fork-migrations
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push ${{ matrix.name }} image (cached)
        uses: docker/build-push-action@v6
        with:
          context: sim-workflow
          file: sim-workflow/${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: |
            type=gha,scope=${{ matrix.image }}
            type=registry,ref=${{ env.REGISTRY }}/cache-${{ matrix.image }}:buildcache
          cache-to: |
            type=gha,scope=${{ matrix.image }},mode=max
            type=registry,ref=${{ env.REGISTRY }}/cache-${{ matrix.image }}:buildcache,mode=max

  build-sim-studio:
    needs: [changes, build-sim-workflow-images]
    if: |
      always() &&
      needs.changes.outputs.sim-studio == 'true' &&
      (needs.build-sim-workflow-images.result == 'success' || needs.build-sim-workflow-images.result == 'skipped')
    concurrency:
      group: deploy-sim-studio-${{ github.ref }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Upload Sim Studio seed SQL
        run: |
          gcloud compute scp studio/seed/simstudio_seed.sql flowindex-backend:~/simstudio_seed.sql --zone=us-central1-a

      - name: Deploy Sim Studio on GCE
        run: |
          gcloud compute ssh flowindex-backend --zone=us-central1-a --command='
            set -e

            # Load backend env for DB credentials
            load_env() {
              while IFS= read -r line || [ -n "$line" ]; do
                [[ "$line" =~ ^[[:space:]]*# ]] && continue
                [[ -z "$line" ]] && continue
                export "$line" 2>/dev/null || true
              done < "$1"
            }
            load_env /mnt/stateful_partition/pgdata/backend.env

            # Auto-create sim-studio.env with secrets if it does not exist
            SIM_ENV=/mnt/stateful_partition/pgdata/sim-studio.env
            if [ ! -f "$SIM_ENV" ]; then
              cat > "$SIM_ENV" << ENVEOF
          BETTER_AUTH_SECRET=$(openssl rand -hex 32)
          ENCRYPTION_KEY=$(openssl rand -hex 32)
          INTERNAL_API_SECRET=$(openssl rand -hex 32)
          SIM_STUDIO_IMAGE=us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork:latest
          SIM_STUDIO_REALTIME_IMAGE=us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork-realtime:latest
          SIM_STUDIO_MIGRATIONS_IMAGE=us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork-migrations:latest
          FLOWINDEX_AUTH_MODE=supabase_cookie
          ENVEOF
              echo "Created $SIM_ENV with generated secrets"
            fi
            load_env "$SIM_ENV"

            SIM_STUDIO_IMAGE="${SIM_STUDIO_IMAGE:-us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork:latest}"
            SIM_STUDIO_REALTIME_IMAGE="${SIM_STUDIO_REALTIME_IMAGE:-us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork-realtime:latest}"
            SIM_STUDIO_MIGRATIONS_IMAGE="${SIM_STUDIO_MIGRATIONS_IMAGE:-us-central1-docker.pkg.dev/flowindex-mainnet/flowindex/simstudio-fork-migrations:latest}"
            FLOWINDEX_AUTH_MODE="${FLOWINDEX_AUTH_MODE:-supabase_cookie}"

            # Use a single shared DB with Supabase by default.
            # Optional override: define SOURCE_SIM_DB_URL in sim-studio.env.
            SOURCE_SIM_DB_URL="${SOURCE_SIM_DB_URL:-$SUPABASE_DB_URL}"

            # Parse DB connection from selected source URL.
            # We intentionally rebuild a clean URL (no inherited query params like search_path)
            # and force simstudio-first search_path for Sim Studio.
            DB_USER=$(echo "$SOURCE_SIM_DB_URL" | sed -n "s|.*://\([^:]*\):.*|\1|p")
            DB_PASS=$(echo "$SOURCE_SIM_DB_URL" | sed -n "s|.*://[^:]*:\([^@]*\)@.*|\1|p")
            DB_HOST=$(echo "$SOURCE_SIM_DB_URL" | sed -n "s|.*://[^:]*:[^@]*@\([^:/?]*\).*|\1|p")
            DB_PORT=$(echo "$SOURCE_SIM_DB_URL" | sed -n "s|.*://[^:]*:[^@]*@[^:/?]*:\([0-9]*\).*|\1|p")
            SIM_DB_NAME=$(echo "$SOURCE_SIM_DB_URL" | sed -n "s|.*/\([^?]*\).*|\1|p")

            if [ -z "$DB_PORT" ]; then
              DB_PORT=5432
            fi
            if [ -z "$SIM_DB_NAME" ]; then
              echo "Failed to parse database name from SOURCE_SIM_DB_URL"
              exit 1
            fi
            SIM_DB_URL="postgresql://${DB_USER}:${DB_PASS}@${DB_HOST}:${DB_PORT}/${SIM_DB_NAME}"

            # Helper: run psql via docker (no psql binary on the VM)
            run_psql() {
              docker run --rm --network=host \
                -e PGPASSWORD="$DB_PASS" \
                postgres:16-alpine \
                psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" "$@"
            }

            # Ensure pgvector is available and visible for migrations.
            VECTOR_SCHEMA=$(run_psql -d "$SIM_DB_NAME" -tAc "SELECT n.nspname FROM pg_type t JOIN pg_namespace n ON n.oid=t.typnamespace WHERE t.typname=\$\$vector\$\$ LIMIT 1;" | tr -d '[:space:]')
            if [ -z "$VECTOR_SCHEMA" ]; then
              run_psql -d "$SIM_DB_NAME" -c "CREATE SCHEMA IF NOT EXISTS extensions;"
              run_psql -d "$SIM_DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS vector WITH SCHEMA extensions;"
              VECTOR_SCHEMA=$(run_psql -d "$SIM_DB_NAME" -tAc "SELECT n.nspname FROM pg_type t JOIN pg_namespace n ON n.oid=t.typnamespace WHERE t.typname=\$\$vector\$\$ LIMIT 1;" | tr -d '[:space:]')
            fi
            if [ -z "$VECTOR_SCHEMA" ]; then
              echo "pgvector type 'vector' is unavailable in database $SIM_DB_NAME"
              exit 1
            fi
            if ! echo "$VECTOR_SCHEMA" | grep -Eq "^[A-Za-z_][A-Za-z0-9_]*$"; then
              echo "Unsafe vector schema name: $VECTOR_SCHEMA"
              exit 1
            fi
            # Keep simstudio first (for Sim Studio tables) and include the actual pgvector schema.
            if [ "$VECTOR_SCHEMA" = "simstudio" ] || [ "$VECTOR_SCHEMA" = "public" ]; then
              SIM_SEARCH_PATH="simstudio,public"
            else
              SIM_SEARCH_PATH="simstudio,public,${VECTOR_SCHEMA}"
            fi
            ENCODED_SIM_SEARCH_PATH=$(printf "%s" "$SIM_SEARCH_PATH" | sed "s/,/%2C/g")
            SIM_MIGRATION_DB_URL="${SIM_DB_URL}?options=-csearch_path%3D${ENCODED_SIM_SEARCH_PATH}"

            # Keep simstudio first (for Sim Studio tables) and include vector schema.
            # Configure both database-level and role-level defaults so non-libpq clients
            # (e.g. postgres-js used by drizzle-kit) still resolve `vector` consistently.
            run_psql -d postgres \
              -c "ALTER DATABASE \"$SIM_DB_NAME\" SET search_path TO ${SIM_SEARCH_PATH}"
            run_psql -d "$SIM_DB_NAME" \
              -c "ALTER ROLE \"$DB_USER\" IN DATABASE \"$SIM_DB_NAME\" SET search_path TO ${SIM_SEARCH_PATH}"
            SEARCH_PATH=$(run_psql -d "$SIM_DB_NAME" -tAc "SHOW search_path;" | tr -d '\r')
            echo "DB search_path: ${SEARCH_PATH:-unknown}"
            echo "vector type schema: $VECTOR_SCHEMA"
            # Hard probe before running migrations: ensure unqualified vector type resolves.
            run_psql -d "$SIM_DB_NAME" -v ON_ERROR_STOP=1 \
              -c "SET search_path TO ${SIM_SEARCH_PATH}; SELECT NULL::vector;"
            echo "Database $SIM_DB_NAME ready"

            # Pull images
            docker pull "$SIM_STUDIO_IMAGE"
            docker pull "$SIM_STUDIO_REALTIME_IMAGE"
            docker pull "$SIM_STUDIO_MIGRATIONS_IMAGE"

            # Run Drizzle migrations (Sim Studio uses Drizzle, not Prisma)
            echo "Running Sim Studio Drizzle migrations..."
            docker run --rm --network=host \
              -e DATABASE_URL="$SIM_MIGRATION_DB_URL" \
              -e PGOPTIONS="-c search_path=${SIM_SEARCH_PATH}" \
              "$SIM_STUDIO_MIGRATIONS_IMAGE" \
              run db:migrate
            echo "Migrations applied"

            echo "Applying Sim Studio startup seed..."
            docker run --rm --network=host -i \
              -e PGPASSWORD="$DB_PASS" \
              postgres:16-alpine \
              psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$SIM_DB_NAME" \
              < ~/simstudio_seed.sql
            echo "Seed applied"

            # Verify critical auth tables exist before starting app containers
            USER_TABLE_OK=$(run_psql -d "$SIM_DB_NAME" -tAc "SELECT to_regclass(\$\$simstudio.\"user\"\$\$) IS NOT NULL;" | tr -d "[:space:]")
            SESSION_TABLE_OK=$(run_psql -d "$SIM_DB_NAME" -tAc "SELECT to_regclass(\$\$simstudio.session\$\$) IS NOT NULL;" | tr -d "[:space:]")
            USER_STATS_TABLE_OK=$(run_psql -d "$SIM_DB_NAME" -tAc "SELECT to_regclass(\$\$simstudio.user_stats\$\$) IS NOT NULL;" | tr -d "[:space:]")
            if [ "$USER_TABLE_OK" != "t" ] || [ "$SESSION_TABLE_OK" != "t" ] || [ "$USER_STATS_TABLE_OK" != "t" ]; then
              echo "Required Sim Studio auth tables missing (user/session/user_stats); aborting deploy"
              exit 1
            fi

            # Stop existing containers
            docker stop sim-studio sim-studio-realtime sim-studio-auth 2>/dev/null || true
            docker rm sim-studio sim-studio-realtime sim-studio-auth 2>/dev/null || true

            # Run Sim Studio (port 3200)
            docker run -d --restart=always --name sim-studio \
              --network=host \
              -e NODE_ENV=production \
              -e DATABASE_URL="$SIM_DB_URL" \
              -e BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET}" \
              -e BETTER_AUTH_URL="https://studio.flowindex.io" \
              -e ENCRYPTION_KEY="${ENCRYPTION_KEY}" \
              -e INTERNAL_API_SECRET="${INTERNAL_API_SECRET}" \
              -e SUPABASE_URL="${VITE_SUPABASE_URL}" \
              -e SUPABASE_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
              -e FLOWINDEX_AUTH_MODE="${FLOWINDEX_AUTH_MODE}" \
              -e NEXT_PUBLIC_APP_URL="https://studio.flowindex.io" \
              -e NEXT_PUBLIC_SOCKET_URL="https://studio.flowindex.io" \
              -e SOCKET_SERVER_URL="http://127.0.0.1:3202" \
              -e PORT=3200 \
              "$SIM_STUDIO_IMAGE"

            # Run Realtime/WebSocket service (port 3202)
            docker run -d --restart=always --name sim-studio-realtime \
              --network=host \
              -e NODE_ENV=production \
              -e DATABASE_URL="$SIM_DB_URL" \
              -e BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET}" \
              -e BETTER_AUTH_URL="https://studio.flowindex.io" \
              -e PORT=3202 \
              -e INTERNAL_API_SECRET="${INTERNAL_API_SECRET}" \
              -e FLOWINDEX_AUTH_MODE="${FLOWINDEX_AUTH_MODE}" \
              -e SUPABASE_JWT_SECRET="${SUPABASE_JWT_SECRET}" \
              -e NEXT_PUBLIC_APP_URL="https://studio.flowindex.io" \
              -e NEXT_PUBLIC_SOCKET_URL="https://studio.flowindex.io" \
              "$SIM_STUDIO_REALTIME_IMAGE"

            echo "Sim Studio deployed (web: 3200, realtime: 3202)"
            docker ps --filter name=sim-studio --format "table {{.Names}}\t{{.Status}}"
          '

      - name: Update Caddy config for studio.flowindex.io TLS
        run: |
          gcloud compute ssh flowindex-frontend --zone=us-central1-a --command="
            sudo tee /tmp/Caddyfile > /dev/null <<'CADDYEOF'
          $(cat frontend/Caddyfile)
          CADDYEOF
            docker cp /tmp/Caddyfile caddy:/etc/caddy/Caddyfile
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile
          "
