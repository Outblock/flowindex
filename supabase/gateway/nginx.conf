server {
  listen 8000;
  server_name _;

  client_max_body_size 10m;

  location = /functions/v1/passkey-auth {
    proxy_pass http://passkey-auth:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /functions/v1/passkey-auth/ {
    proxy_pass http://passkey-auth:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location = /functions/v1/flow-keys {
    proxy_pass http://flow-keys:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /functions/v1/flow-keys/ {
    proxy_pass http://flow-keys:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location = /functions/v1/runner-projects {
    proxy_pass http://runner-projects:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_hide_header Access-Control-Allow-Origin;
    proxy_hide_header Access-Control-Allow-Headers;
    proxy_hide_header Access-Control-Allow-Methods;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
