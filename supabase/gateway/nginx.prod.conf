server {
  listen ${GATEWAY_PORT};
  server_name _;

  client_max_body_size 10m;

  location = /functions/v1/passkey-auth {
    proxy_pass http://127.0.0.1:${PASSKEY_AUTH_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /functions/v1/passkey-auth/ {
    proxy_pass http://127.0.0.1:${PASSKEY_AUTH_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location = /functions/v1/flow-keys {
    proxy_pass http://127.0.0.1:${FLOW_KEYS_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /functions/v1/flow-keys/ {
    proxy_pass http://127.0.0.1:${FLOW_KEYS_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location = /functions/v1/runner-projects {
    proxy_pass http://127.0.0.1:${RUNNER_PROJECTS_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, apikey, x-client-info" always;
    add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
    if ($request_method = OPTIONS) {
      return 204;
    }
  }

  location /auth/v1/ {
    rewrite ^/auth/v1/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:${GOTRUE_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /rest/v1/ {
    rewrite ^/rest/v1/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:${POSTGREST_PORT};
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
